name: Deploy to Oracle VM

# On every push to main, SSH into the always-on VM, pull the latest code,
# reinstall dependencies, and restart the systemd service.
on:
    push:
        branches:
            - main
    workflow_dispatch:

# Don't let two deploys run at once; cancel an in-flight one if a newer push lands.
concurrency:
    group: deploy-oracle-vm
    cancel-in-progress: true

jobs:
    deploy:
        name: Pull & restart on VM
        runs-on: ubuntu-latest
        steps:
            - name: Deploy over SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.VM_SSH_KEY }}
                  script_stop: true
                  script: |
                      cd ~/Crypto-RSI-Alerts
                      git pull --ff-only
                      ./venv/bin/pip install -q -r requirements.txt
                      sudo systemctl restart rsi-monitor
                      sleep 3
                      systemctl is-active rsi-monitor
